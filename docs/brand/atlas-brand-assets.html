  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

splay: swap;\n  src: url(\"37a58d1d-2243-4697-944f-4a27f3e78f3d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d4ed2154-33e3-4e16-94de-e32c9a040616\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"624a0eac-b3ff-407b-a4ae-06c79bd611a9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    :root {\n      --paper: #f3efe6;\n      --panel: #fbfaf6;\n      --panel-2: #f0ebe0;\n      --ink: #211f1a;\n      --ink-soft: #6e695b;\n      --ink-faint: #9a9485;\n      --line: #e4ddcd;\n      --line-strong: #d3cab6;\n      --accent: #2f6df0;\n      --c-birthplace: #e8943a;\n      --c-lived: #2f6df0;\n      --c-visited: #1f9d6b;\n      --c-capital: #9fc2f2;\n      --font-ui: 'Hanken Grotesk', ui-sans-serif, system-ui, sans-serif;\n      --font-display: 'Newsreader', Georgia, serif;\n      --font-mono: 'JetBrains Mono', ui-monospace, monospace;\n      --shadow: 0 14px 40px -18px rgba(40,34,20,.28), 0 2px 8px rgba(40,34,20,.05);\n      --shadow-sm: 0 1px 2px rgba(40,34,20,.05);\n    }\n    * { box-sizing: border-box; }\n    body {\n      margin: 0;\n      font-family: var(--font-ui);\n      color: var(--ink);\n      background:\n        radial-gradient(120% 80% at 100% -10%, rgba(47,109,240,.05), transparent 60%),\n        var(--paper);\n      -webkit-font-smoothing: antialiased;\n    }\n    .mono { font-family: var(--font-mono); }\n    .kicker { font-family: var(--font-mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-faint); }\n\n    .sheet { width: min(1080px, 100%); margin: 0 auto; padding: 64px 32px 96px; }\n\n    /* page header */\n    .doc-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; padding-bottom: 28px; border-bottom: 1px solid var(--line); margin-bottom: 56px; flex-wrap: wrap; }\n    .doc-head h1 { font-family: var(--font-display); font-size: 44px; font-weight: 500; letter-spacing: -.02em; margin: 10px 0 0; line-height: 1; }\n    .doc-head h1 em { font-style: italic; color: var(--accent); }\n    .doc-head p { color: var(--ink-soft); margin: 8px 0 0; max-width: 46ch; }\n\n    section { margin-bottom: 64px; }\n    .sec-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 22px; }\n    .sec-head h2 { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -.01em; margin: 0; }\n    .sec-head .num { font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); }\n    .sec-note { color: var(--ink-soft); font-size: 14px; max-width: 60ch; margin: -10px 0 22px; }\n\n    .frame { border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; background: var(--panel); }\n    .frame-cap { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 16px; border-top: 1px solid var(--line); background: var(--panel); }\n    .frame-cap .mono { font-size: 11px; letter-spacing: .08em; color: var(--ink-faint); text-transform: uppercase; }\n    .stage { display: grid; place-items: center; padding: 56px 32px; }\n    .stage.on-paper { background: var(--paper); }\n    .stage.on-panel { background: var(--panel); }\n    .stage.on-ink { background: var(--ink); }\n    .stage.on-accent { background: var(--accent); }\n\n    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n    .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n\n    /* ── logomark ── */\n    .mark { border-radius: 50%; position: relative; display: grid; place-items: center; flex-shrink: 0; }\n    .mark::after { content: ''; position: absolute; border-radius: 50%; }\n    .mark svg { position: relative; z-index: 1; display: block; }\n\n    /* lockup */\n    .lockup { display: flex; align-items: center; gap: 16px; }\n    .lockup .wordmark { display: flex; flex-direction: column; line-height: 1.05; }\n    .lockup .name { font-family: var(--font-display); font-weight: 600; letter-spacing: -.015em; }\n    .lockup .tag { font-family: var(--font-mono); letter-spacing: .14em; text-transform: uppercase; }\n\n    /* favicon / app icon */\n    .appicon { display: grid; place-items: center; position: relative; overflow: hidden; }\n    .icon-sizes { display: flex; align-items: flex-end; gap: 26px; }\n    .icon-sizes figure { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }\n    .icon-sizes figcaption { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; color: var(--ink-faint); }\n\n    /* avatar */\n    .avatar-row { display: flex; align-items: center; gap: 24px; }\n\n    /* OG card */\n    .og { width: 1200px; height: 630px; position: relative; overflow: hidden; background: var(--ink); color: var(--paper); transform-origin: top left; }\n    .og-scale { width: 100%; overflow: hidden; }\n\n    /* palette */\n    .swatches { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }\n    .sw { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm); }\n    .sw-chip { height: 76px; }\n    .sw-meta { padding: 9px 12px; background: var(--panel); }\n    .sw-name { font-size: 12.5px; font-weight: 700; }\n    .sw-hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); text-transform: uppercase; margin-top: 1px; }\n\n    /* clearspace diagram bits */\n    .cs-wrap { position: relative; display: inline-grid; place-items: center; }\n    .cs-pad { position: absolute; inset: 0; border: 1px dashed var(--line-strong); border-radius: 8px; }\n\n    .dont-ok { color: var(--c-visited); }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"sheet\">\n\n    <header class=\"doc-head\">\n      <div>\n        <div class=\"kicker\">Brand Assets — Identity Sheet<\u002Fdiv>\n        <h1>Atlas <em>·<\u002Fem> brand kit<\u002Fh1>\n        <p>Logo, mark, favicon, avatar and social card for the personal travel cartography app. All drawn from the product's live palette and type system.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mono\" style=\"font-size:11px;letter-spacing:.12em;color:var(--ink-faint);text-align:right;line-height:1.9\">\n        EST. 2026<br>EQUAL EARTH<br>v1.0\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ───────── 01 PRIMARY LOGO ───────── -->\n    <section>\n      <div class=\"sec-head\"><span class=\"num\">01<\u002Fspan><h2>Primary logo<\u002Fh2><\u002Fdiv>\n      <p class=\"sec-note\">Horizontal lockup: compass mark + serif wordmark + mono tagline. Use on light surfaces by default; reverse to paper on ink/accent.<\u002Fp>\n      <div class=\"row2\">\n        <div class=\"frame\">\n          <div class=\"stage on-paper\">\n            <div class=\"lockup\" id=\"lockup-light\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"frame-cap\"><span class=\"mono\">Primary · on paper<\u002Fspan><span class=\"mono\">#f3efe6<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frame\">\n          <div class=\"stage on-ink\">\n            <div class=\"lockup\" id=\"lockup-dark\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"frame-cap\"><span class=\"mono\">Reversed · on ink<\u002Fspan><span class=\"mono\">#211f1a<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ───────── 02 LOGOMARK ───────── -->\n    <section>\n      <div class=\"sec-head\"><span class=\"num\">02<\u002Fspan><h2>Logomark<\u002Fh2><\u002Fdiv>\n      <p class=\"sec-note\">The compass rose in a double ring. Stands alone as the app glyph. Keep clearspace equal to the inner ring gap on all sides; never let the needle touch the outer circle.<\u002Fp>\n      <div class=\"row3\">\n        <div class=\"frame\">\n          <div class=\"stage on-paper\"><div id=\"mark-paper\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"frame-cap\"><span class=\"mono\">Mark · ink on paper<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frame\">\n          <div class=\"stage on-ink\"><div id=\"mark-ink\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"frame-cap\"><span class=\"mono\">Mark · paper on ink<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frame\">\n          <div class=\"stage on-accent\"><div id=\"mark-accent\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"frame-cap\"><span class=\"mono\">Mark · on accent<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ───────── 03 FAVICON / APP ICON ───────── -->\n    <section>\n      <div class=\"sec-head\"><span class=\"num\">03<\u002Fspan><h2>Favicon &amp; app icon<\u002Fh2><\u002Fdiv>\n      <p class=\"sec-note\">Solid ink tile with the paper mark, rounded per platform. The needle scales but the rings simplify at 16px — render the smallest size from the mark alone.<\u002Fp>\n      <div class=\"frame\">\n        <div class=\"stage on-panel\">\n          <div class=\"icon-sizes\" id=\"icon-sizes\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frame-cap\"><span class=\"mono\">App icon · ink tile<\u002Fspan><span class=\"mono\">512 · 192 · 64 · 32 · 16 px<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ───────── 04 AVATAR ───────── -->\n    <section>\n      <div class=\"sec-head\"><span class=\"num\">04<\u002Fspan><h2>Avatar<\u002Fh2><\u002Fdiv>\n      <p class=\"sec-note\">Circular profile/account badge — accent fill with the paper mark, matching the in-app avatar treatment.<\u002Fp>\n      <div class=\"frame\">\n        <div class=\"stage on-panel\">\n          <div class=\"avatar-row\" id=\"avatar-row\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frame-cap\"><span class=\"mono\">Avatar · accent fill<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ───────── 05 OG / SOCIAL CARD ───────── -->\n    <section>\n      <div class=\"sec-head\"><span class=\"num\">05<\u002Fspan><h2>Open Graph card<\u002Fh2><\u002Fdiv>\n      <p class=\"sec-note\">1200 × 630 social share image. Ink ground, coordinate grid, mark + name top-left, headline in serif. Scaled to fit below; exports at full resolution.<\u002Fp>\n      <div class=\"frame\">\n        <div class=\"og-scale\" id=\"og-scale\">\n          <div class=\"og\" id=\"og-card\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"frame-cap\"><span class=\"mono\">og:image · 1200 × 630<\u002Fspan><span class=\"mono\">1.91 : 1<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ───────── 06 PALETTE ───────── -->\n    <section>\n      <div class=\"sec-head\"><span class=\"num\">06<\u002Fspan><h2>Core palette<\u002Fh2><\u002Fdiv>\n      <div class=\"swatches\" id=\"swatches\"><\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <script>\n    // ── compass mark builder ──────────────────────────────────────────\n    // size = outer diameter. ringInset/needleColor derive proportionally.\n    function compassMark(size, opts) {\n      opts = opts || {};\n      const stroke = opts.stroke || 'var(--ink)';\n      const ringColor = opts.ring || 'var(--line-strong)';\n      const needle = opts.needle || 'var(--ink)';\n      const bw = Math.max(1, size * 0.038);          // outer border width\n      const inset = Math.max(3, size * 0.15);        // inner ring inset\n      const glyph = Math.round(size * 0.52);         // compass icon size\n      const el = document.createElement('div');\n      el.className = 'mark';\n      el.style.width = size + 'px';\n      el.style.height = size + 'px';\n      el.style.border = bw + 'px solid ' + stroke;\n      el.innerHTML =\n        '<svg width=\"' + glyph + '\" height=\"' + glyph + '\" viewBox=\"0 0 24 24\" fill=\"none\" ' +\n        'stroke=\"' + needle + '\" stroke-width=\"1.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\">' +\n        '<path d=\"M16.2 7.8l-2.4 5.6-5.6 2.4 2.4-5.6 5.6-2.4Z\" fill=\"' + needle + '\" fill-opacity=\"0.14\"/>' +\n        '<\u002Fsvg>';\n      const ring = el.appendChild(document.createElement('i'));\n      // use ::after via inline style on a child instead\n      el.removeChild(ring);\n      const after = document.createElement('span');\n      after.style.cssText =\n        'position:absolute;border-radius:50%;border:' + Math.max(1, size*0.022) + 'px solid ' + ringColor + ';' +\n        'top:' + inset + 'px;left:' + inset + 'px;right:' + inset + 'px;bottom:' + inset + 'px;';\n      el.appendChild(after);\n      return el;\n    }\n\n    // ── lockup builder ────────────────────────────────────────────────\n    function buildLockup(target, dark) {\n      const stroke = dark ? 'var(--paper)' : 'var(--ink)';\n      const ring = dark ? 'rgba(243,239,230,.4)' : 'var(--line-strong)';\n      const needle = dark ? 'var(--paper)' : 'var(--ink)';\n      const tx = dark ? 'var(--paper)' : 'var(--ink)';\n      const tagc = dark ? 'rgba(243,239,230,.6)' : 'var(--ink-faint)';\n      target.appendChild(compassMark(58, { stroke, ring, needle }));\n      const wm = document.createElement('div');\n      wm.className = 'wordmark';\n      wm.innerHTML =\n        '<span class=\"name\" style=\"font-size:34px;color:' + tx + '\">Atlas<\u002Fspan>' +\n        '<span class=\"tag\" style=\"font-size:10px;color:' + tagc + '\">Personal travel cartography<\u002Fspan>';\n      target.appendChild(wm);\n    }\n    buildLockup(document.getElementById('lockup-light'), false);\n    buildLockup(document.getElementById('lockup-dark'), true);\n\n    // ── standalone marks ──\n    document.getElementById('mark-paper').appendChild(compassMark(96, {}));\n    document.getElementById('mark-ink').appendChild(compassMark(96, { stroke: 'var(--paper)', ring: 'rgba(243,239,230,.4)', needle: 'var(--paper)' }));\n    document.getElementById('mark-accent').appendChild(compassMark(96, { stroke: 'var(--paper)', ring: 'rgba(255,255,255,.5)', needle: 'var(--paper)' }));\n\n    // ── app icon tiles ──\n    function appIconTile(px) {\n      const radius = Math.round(px * 0.22);\n      const tile = document.createElement('div');\n      tile.className = 'appicon';\n      tile.style.cssText =\n        'width:' + px + 'px;height:' + px + 'px;background:var(--ink);border-radius:' + radius + 'px;' +\n        'box-shadow:var(--shadow);';\n      // small sizes: just the needle glyph, larger: full mark\n      if (px <= 32) {\n        const g = Math.round(px * 0.62);\n        tile.innerHTML =\n          '<svg width=\"' + g + '\" height=\"' + g + '\" viewBox=\"0 0 24 24\" fill=\"none\" ' +\n          'stroke=\"var(--paper)\" stroke-width=\"1.8\" stroke-linejoin=\"round\" stroke-linecap=\"round\">' +\n          '<path d=\"M16.2 7.8l-2.4 5.6-5.6 2.4 2.4-5.6 5.6-2.4Z\" fill=\"var(--paper)\" fill-opacity=\"0.18\"/><\u002Fsvg>';\n      } else {\n        tile.appendChild(compassMark(Math.round(px * 0.62), { stroke: 'var(--paper)', ring: 'rgba(243,239,230,.45)', needle: 'var(--paper)' }));\n      }\n      return tile;\n    }\n    const sizes = [\n      { px: 128, label: '512' },   // display capped at 128 for the big one\n      { px: 96, label: '192' },\n      { px: 64, label: '64' },\n      { px: 32, label: '32' },\n      { px: 16, label: '16' },\n    ];\n    const iconWrap = document.getElementById('icon-sizes');\n    sizes.forEach(s => {\n      const fig = document.createElement('figure');\n      fig.appendChild(appIconTile(s.px));\n      const cap = document.createElement('figcaption');\n      cap.textContent = s.label + 'px';\n      fig.appendChild(cap);\n      iconWrap.appendChild(fig);\n    });\n\n    // ── avatars ──\n    function avatar(px) {\n      const a = document.createElement('div');\n      a.style.cssText =\n        'width:' + px + 'px;height:' + px + 'px;border-radius:50%;background:var(--accent);' +\n        'display:grid;place-items:center;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,.08);';\n      a.appendChild(compassMark(Math.round(px * 0.6), { stroke: 'var(--paper)', ring: 'rgba(255,255,255,.55)', needle: 'var(--paper)' }));\n      return a;\n    }\n    const avRow = document.getElementById('avatar-row');\n    [88, 56, 34].forEach(p => avRow.appendChild(avatar(p)));\n\n    // ── OG card ──\n    (function buildOG() {\n      const og = document.getElementById('og-card');\n      // coordinate grid + glow\n      const grid =\n        'background-image:' +\n          'linear-gradient(rgba(243,239,230,.055) 1px, transparent 1px),' +\n          'linear-gradient(90deg, rgba(243,239,230,.055) 1px, transparent 1px);' +\n        'background-size:60px 60px;';\n      og.innerHTML =\n        '<div style=\"position:absolute;inset:0;' + grid + '\"><\u002Fdiv>' +\n        '<div style=\"position:absolute;inset:0;background:radial-gradient(80% 90% at 88% 18%, rgba(47,109,240,.30), transparent 60%);\"><\u002Fdiv>' +\n        '<div style=\"position:absolute;inset:0;background:radial-gradient(60% 80% at 8% 95%, rgba(31,157,107,.16), transparent 60%);\"><\u002Fdiv>' +\n        // top-left brand row\n        '<div id=\"og-brand\" style=\"position:absolute;top:56px;left:64px;display:flex;align-items:center;gap:18px;z-index:2;\"><\u002Fdiv>' +\n        // headline\n        '<div style=\"position:absolute;left:64px;bottom:150px;right:64px;z-index:2;\">' +\n          '<div style=\"font-family:var(--font-mono);font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:rgba(243,239,230,.55);margin-bottom:18px;\">Every place you\\'ve been · one map<\u002Fdiv>' +\n          '<div style=\"font-family:var(--font-display);font-size:78px;font-weight:500;line-height:1.0;letter-spacing:-.02em;max-width:18ch;\">Map your life in <em style=\"font-style:italic;color:#7ea6f7;\">countries<\u002Fem>.<\u002Fdiv>' +\n        '<\u002Fdiv>' +\n        // footer coords\n        '<div style=\"position:absolute;left:64px;bottom:56px;right:64px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:14px;letter-spacing:.14em;color:rgba(243,239,230,.5);z-index:2;\">' +\n          '<span>atlas.app<\u002Fspan><span>48.45°N&nbsp;&nbsp;35.04°E<\u002Fspan><span>EQUAL EARTH<\u002Fspan>' +\n        '<\u002Fdiv>';\n      const brand = og.querySelector('#og-brand');\n      brand.appendChild(compassMark(72, { stroke: 'var(--paper)', ring: 'rgba(243,239,230,.4)', needle: 'var(--paper)' }));\n      const wm = document.createElement('div');\n      wm.style.cssText = 'display:flex;flex-direction:column;line-height:1.05;';\n      wm.innerHTML =\n        '<span style=\"font-family:var(--font-display);font-size:40px;font-weight:600;letter-spacing:-.015em;color:var(--paper);\">Atlas<\u002Fspan>' +\n        '<span style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(243,239,230,.6);\">Personal travel cartography<\u002Fspan>';\n      brand.appendChild(wm);\n\n      // scale OG to fit container width\n      function fit() {\n        const wrap = document.getElementById('og-scale');\n        const scale = wrap.clientWidth / 1200;\n        og.style.transform = 'scale(' + scale + ')';\n        wrap.style.height = (630 * scale) + 'px';\n      }\n      fit();\n      window.addEventListener('resize', fit);\n    })();\n\n    // ── palette swatches ──\n    const palette = [\n      { name: 'Paper', hex: '#f3efe6' },\n      { name: 'Ink', hex: '#211f1a' },\n      { name: 'Accent', hex: '#2f6df0' },\n      { name: 'Birthplace', hex: '#e8943a' },\n      { name: 'Lived', hex: '#2f6df0' },\n      { name: 'Visited', hex: '#1f9d6b' },\n      { name: 'Capital', hex: '#9fc2f2' },\n      { name: 'Line', hex: '#e4ddcd' },\n    ];\n    const sw = document.getElementById('swatches');\n    palette.forEach(c => {\n      const el = document.createElement('div');\n      el.className = 'sw';\n      el.innerHTML =\n        '<div class=\"sw-chip\" style=\"background:' + c.hex + '\"><\u002Fdiv>' +\n        '<div class=\"sw-meta\"><div class=\"sw-name\">' + c.name + '<\u002Fdiv><div class=\"sw-hex\">' + c.hex + '<\u002Fdiv><\u002Fdiv>';\n      sw.appendChild(el);\n    });\n  <\u002Fscript>\n\n  \n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
