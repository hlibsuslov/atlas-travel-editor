# Run a self-hosted Atlas Server in one command:
#   docker compose up --build
# Then point the Atlas web app at http://localhost:8787 (storage picker → Atlas
# Server) to enable accounts, syncing, profiles and sharing. The web app itself
# stays local-first and works with no server at all.
services:
  atlas-server:
    build: ./server
    image: atlas-server:local
    ports:
      - '8787:8787'
    environment:
      # Set a strong value in production; rotates nothing secret but documents intent.
      ATLAS_ALLOW_SIGNUP: '1'
      # Comma-separated allowed web-app origins for CORS (default '*' for local dev).
      # ATLAS_CORS_ORIGINS: 'https://your-atlas.example.com'
    volumes:
      - atlas-data:/data
    restart: unless-stopped

  # The local-first web app at http://localhost:8080 — no backend required.
  # Everything is stored in the browser (IndexedDB). Connect it to the optional
  # atlas-server above via the in-app storage picker to enable social/sharing.
  web:
    build: .
    image: atlas-web:local
    ports:
      - '8080:80'
    restart: unless-stopped

volumes:
  atlas-data:
