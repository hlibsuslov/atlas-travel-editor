<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#f3efe6" />
    <meta
      name="description"
      content="Map every country you were born in, have lived in, or visited."
    />

    <!-- Open Graph / Twitter social card. Images are brand assets generated
         from the Atlas brand kit (see docs/brand/). Paths are root-relative so
         they resolve against whatever domain the app is deployed to. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Atlas" />
    <meta property="og:title" content="Atlas — Personal travel cartography" />
    <meta
      property="og:description"
      content="Map your life in countries — every place you've been, drawn as one map."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Atlas — map your life in countries" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Atlas — Personal travel cartography" />
    <meta
      name="twitter:description"
      content="Map your life in countries — every place you've been, drawn as one map."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Atlas — Personal travel cartography</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>This application requires JavaScript to run.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
