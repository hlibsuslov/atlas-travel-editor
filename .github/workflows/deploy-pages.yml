# Deploys the local-first Atlas web app to GitHub Pages.
#
# Note: GitHub Pages cannot apply the security headers (CSP/HSTS/etc.) defined in
# vercel.json — those are served only by the host that honours them (Vercel or a
# self-hosted reverse proxy). The Pages build is a plain static PWA.
name: Deploy to GitHub Pages

on:
  # Vercel is the canonical production host. Pages is an optional, manual mirror;
  # enable GitHub Pages in repository settings before dispatching this workflow.
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # GITHUB_PAGES=true makes Vite resolve assets under /atlas-travel-editor/.
      - name: Build
        run: GITHUB_PAGES=true npm run build

      # SPA fallback: Pages serves 404.html for unknown paths, so reuse index.html.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
